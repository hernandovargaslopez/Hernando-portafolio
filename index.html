
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hernando Vargas | AI Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-maestro: #ec4899;
      --gradient-primary: linear-gradient(9deg, #af0d0d, #ff9090);
      
      /* Light Mode Variables */
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: #e2e8f0;
    }

    /* Dark Mode Overrides */
    .dark {
      --glass-bg: #0d121c;
      --glass-border: #282c42;
    }

    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      transition: background-color 0.3s, border-color 0.3s;
    }

    .bg-primary-gradient {
      background: var(--gradient-primary);
    }

    .text-primary-gradient {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Shiny Spinning Border Effect */
    @keyframes shiny-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .shiny-border-container {
      position: relative;
      padding: 1.5px; /* El grosor del "borde" de luz */
      overflow: hidden;
      border-radius: 1.5rem;
      z-index: 0;
    }

    .shiny-border-container::before {
      content: '';
      position: absolute;
      top: -150%;
      left: -150%;
      width: 400%;
      height: 400%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        transparent 30%,
        var(--accent) 45%,
        var(--accent-secondary) 50%,
        var(--accent-maestro) 55%,
        transparent 70%,
        transparent 100%
      );
      animation: shiny-spin 12s linear infinite;
      z-index: -1;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    
    .dark ::-webkit-scrollbar-track {
      background: #020305;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>

</head>
<body>
  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
</body>
</html>
